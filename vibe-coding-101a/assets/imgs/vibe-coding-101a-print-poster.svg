        <circle cx="8" cy="35" r="8" fill="#0b2aa4"/><path d="M4 34l3 4 7-9" stroke="#fff" stroke-width="2.5" fill="none"/><text class="checkText" x="24" y="41">進行信度檢驗與配對 t 檢定</text>
        <circle cx="8" cy="70" r="8" fill="#0b2aa4"/><path d="M4 69l3 4 7-9" stroke="#fff" stroke-width="2.5" fill="none"/><text class="checkText" x="24" y="76">自動化圖表製作與結果視覺化</text>
        <circle cx="8" cy="105" r="8" fill="#0b2aa4"/><path d="M4 104l3 4 7-9" stroke="#fff" stroke-width="2.5" fill="none"/><text class="checkText" x="24" y="111">建立可重複的 AI 分析工作流</text>
