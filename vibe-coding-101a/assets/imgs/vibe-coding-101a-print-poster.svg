      <text x="300" y="66" font-size="28" font-weight="900" fill="#0b2aa4">→</text>
      <g transform="translate(336 0)"><circle cx="54" cy="54" r="45" fill="#f1f7ff" stroke="#bdd7ff"/><circle cx="54" cy="0" r="15" fill="#0b2aa4"/><text class="stepNum" x="54" y="6" text-anchor="middle">3</text><circle cx="37" cy="43" r="13" fill="#0b2aa4"/><circle cx="71" cy="43" r="13" fill="#0b2aa4"/><path d="M18 85c4-22 36-22 40 0M50 85c4-22 36-22 40 0" fill="#0b2aa4"/><text class="stepText" x="54" y="134" text-anchor="middle">配對 t 檢定分析</text></g>
      <text x="468" y="66" font-size="28" font-weight="900" fill="#0b2aa4">→</text>
      <g transform="translate(504 0)"><circle cx="54" cy="54" r="45" fill="#f1f7ff" stroke="#bdd7ff"/><circle cx="54" cy="0" r="15" fill="#0b2aa4"/><text class="stepNum" x="54" y="6" text-anchor="middle">4</text><path d="M28 82h9V58h-9zM45 82h9V40h-9zM62 82h9V28h-9z" fill="#1b75ff"/><path d="M78 31a24 24 0 1 1-19 43V50h43a24 24 0 0 0-24-19z" fill="#f5c400"/><path d="M78 31v24h24" fill="#f5c400" stroke="#fff" stroke-width="2"/><text class="stepText" x="54" y="134" text-anchor="middle">圖表製作與視覺化</text></g>
      <text x="636" y="66" font-size="28" font-weight="900" fill="#0b2aa4">→</text>
      <g transform="translate(672 0)"><circle cx="54" cy="54" r="45" fill="#f1f7ff" stroke="#bdd7ff"/><circle cx="54" cy="0" r="15" fill="#0b2aa4"/><text class="stepNum" x="54" y="6" text-anchor="middle">5</text><path d="M33 24h35l16 16v50H33z" fill="#dbeafe" stroke="#0b2aa4" stroke-width="3"/><path d="M68 24v16h16M45 54h25M45 68h25" stroke="#0b2aa4" stroke-width="4"/><text class="stepText" x="54" y="134" text-anchor="middle">研究報告撰寫與輸出</text></g>
    </g>
  </g>

  <g class="sans">
    <g transform="translate(24 1262)">
      <rect x="0" y="0" width="329" height="206" rx="12" fill="url(#softPanel)" stroke="#9ec3ff" filter="url(#shadow)"/>
      <rect x="0" y="-13" width="138" height="34" rx="17" fill="url(#deepBlue)"/>
      <text class="sectionTitle" x="69" y="11" text-anchor="middle">你將學到</text>
      <g transform="translate(18 54)">
