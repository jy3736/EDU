  </g>

  <g class="sans">
    <g transform="translate(24 86)">
      <rect width="398" height="45" rx="22.5" fill="url(#deepBlue)" filter="url(#shadow)"/>
      <text class="pill" x="199" y="32" text-anchor="middle">Vibe Coding 101A 工作坊</text>
    </g>

    <text class="hero" x="30" y="224">從資料分析到</text>
    <text class="hero2" x="30" y="314">教學洞察的 <tspan fill="url(#aiText)" font-size="82">AI</tspan> 工作流</text>
    <text class="lead" x="32" y="372">讓 <tspan fill="#4028e8" font-weight="950">AI</tspan> 成為你的教學研究助理，</text>
    <text class="lead" x="32" y="408">把時間留給教學與研究思考！</text>

    <g transform="translate(472 278)" opacity="0.72">
      <path d="M54 86h178a12 12 0 0 1 12 12v74H42V98a12 12 0 0 1 12-12Z" fill="#e7f1ff" stroke="#94bdf8" stroke-width="2"/>
      <path d="M21 177h246" stroke="#94bdf8" stroke-width="4" stroke-linecap="round"/>
      <path d="M74 143l40-36 34 18 52-58 24 21" fill="none" stroke="#1b75ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M72 150h160" stroke="#9ec3f8" stroke-width="2"/>
      <circle cx="74" cy="143" r="4" fill="#1b75ff"/><circle cx="114" cy="107" r="4" fill="#1b75ff"/><circle cx="148" cy="125" r="4" fill="#1b75ff"/><circle cx="200" cy="67" r="4" fill="#1b75ff"/>
    </g>

    <circle cx="847" cy="248" r="146" fill="#dbeafe" opacity="0.75"/>
    <image href="instructor01-avatar.jpg" x="707" y="108" width="280" height="280" preserveAspectRatio="xMidYMid slice" clip-path="url(#avatarClip)"/>
    <path d="M732 424 C786 400 918 402 982 449 L982 506 L700 506 C694 474 704 444 732 424Z" fill="#e8f1ff" opacity="0.86"/>
    <g transform="translate(674 471)">
      <rect x="0" y="0" width="66" height="35" rx="17" fill="url(#deepBlue)"/>
      <text x="33" y="24" text-anchor="middle" font-size="22" font-weight="900" fill="#fff">講師</text>
      <text x="82" y="27" font-size="40" font-weight="900" fill="#111827">楊榮林</text>
      <text x="210" y="27" font-size="22" font-weight="800" fill="#111827">教授</text>
      <text x="8" y="68" font-size="20" font-weight="750" fill="#111827">南臺科技大學 電子工程系</text>
    </g>
  </g>

  <g class="sans" transform="translate(24 438)" filter="url(#shadow)">
    <rect x="0" y="0" width="640" height="124" rx="11" fill="#fff" stroke="#9ec3ff" stroke-width="1.3"/>
    <g transform="translate(28 28)">
      <rect x="0" y="6" width="43" height="43" rx="8" fill="#eef6ff" stroke="#0b2aa4" stroke-width="3"/>
      <path d="M9 17h25M13 0v14M30 0v14M10 28h6m9 0h6M10 39h6m9 0h6" stroke="#0b2aa4" stroke-width="3" stroke-linecap="round"/>
      <text x="65" y="24" font-size="22" font-weight="850" fill="#111827">日期</text>
      <text x="65" y="58" font-size="20" font-weight="780" fill="#111827">第一場次 7/3（四）</text>
      <text x="65" y="87" font-size="20" font-weight="780" fill="#111827">第二場次 7/9（三）</text>
    </g>
    <line x1="280" y1="36" x2="280" y2="98" stroke="#9ec3ff" stroke-width="2"/>
    <g transform="translate(306 31)">
      <circle cx="22" cy="22" r="21" fill="#eef6ff" stroke="#0b2aa4" stroke-width="4"/>
      <path d="M22 10v15l12 9" stroke="#0b2aa4" stroke-width="4" stroke-linecap="round" fill="none"/>
      <text x="60" y="22" font-size="22" font-weight="850" fill="#111827">時間</text>
      <text x="60" y="58" font-size="20" font-weight="780" fill="#111827">9:00 ~ 12:00</text>
    </g>
    <line x1="512" y1="36" x2="512" y2="98" stroke="#9ec3ff" stroke-width="2"/>
    <g transform="translate(528 29)">
      <path d="M24 2 C38 2 48 13 48 27 C48 45 24 68 24 68 C24 68 0 45 0 27 C0 13 10 2 24 2Z" fill="#eef6ff" stroke="#0b2aa4" stroke-width="4"/>
      <circle cx="24" cy="26" r="8" fill="#0b2aa4"/>
      <text x="58" y="24" font-size="22" font-weight="850" fill="#111827">地點</text>
      <text x="58" y="59" font-size="20" font-weight="780" fill="#111827">J301</text>
    </g>
  </g>

  <g class="sans">
    <g transform="translate(24 594)">
      <rect x="0" y="0" width="474" height="406" rx="14" fill="url(#softPanel)" stroke="#9ec3ff" stroke-width="1.3" filter="url(#shadow)"/>
      <rect x="0" y="-10" width="154" height="36" rx="18" fill="url(#deepBlue)"/>
      <text class="sectionTitle" x="77" y="15" text-anchor="middle">工作坊簡介</text>
      <text class="body" x="18" y="58">還在為問卷資料整理與統計分析耗費大量時間嗎？三小時，</text>
      <text class="body" x="18" y="86">帶你運用 AI 代理（Claude Code、Codex 或 Copilot），</text>
      <text class="body" x="18" y="114">把一份真實的 SIMS 學習動機問卷從原始資料一路做到</text>
      <text class="body" x="18" y="142">可交付的分析成果：資料清理、信度檢驗、配對 t 檢定、</text>
      <text class="body" x="18" y="170">圖表製作到研究報告撰寫，全程實作一次完成。</text>
      <text class="body" x="18" y="218">不需程式設計背景，只要會提問、判讀、驗證，就能讓</text>
      <text class="body" x="18" y="246">AI 成為你的教學研究助理，把時間留給教學與研究思考，</text>
      <text class="body" x="18" y="274">而不是重複性的資料處理工作。</text>
      <g transform="translate(37 306)">
        <g transform="translate(0 0)"><rect width="85" height="86" rx="8" fill="#fff" stroke="#bdd7ff"/><g transform="translate(0 -4)"><path d="M31 25h25v28H31zM37 19h13M24 53h38" fill="none" stroke="#0b2aa4" stroke-width="4"/></g><text class="mini" x="42.5" y="78" text-anchor="middle">不需程式背景</text></g>
        <g transform="translate(105 0)"><rect width="85" height="86" rx="8" fill="#fff" stroke="#bdd7ff"/><g transform="translate(0 -5)"><ellipse cx="43" cy="35" rx="23" ry="11" fill="#0b2aa4"/><path d="M20 36v22c0 6 46 6 46 0V36M62 45h14M69 38v14" stroke="#0b2aa4" stroke-width="4" fill="none"/></g><text class="mini" x="42.5" y="78" text-anchor="middle">真實資料實作</text></g>
        <g transform="translate(210 0)"><rect width="85" height="86" rx="8" fill="#fff" stroke="#bdd7ff"/><g transform="translate(0 -7)"><circle cx="43" cy="40" r="20" fill="#e6f2ff"/><path d="M25 36h36M31 26h24M31 50h24" stroke="#0b2aa4" stroke-width="5" stroke-linecap="round"/><circle cx="23" cy="40" r="5" fill="#0b2aa4"/><circle cx="63" cy="40" r="5" fill="#0b2aa4"/></g><text class="mini" x="42.5" y="78" text-anchor="middle">AI 工具協作</text></g>
        <g transform="translate(315 0)"><rect width="85" height="86" rx="8" fill="#fff" stroke="#bdd7ff"/><g transform="translate(0 -7)"><path d="M29 18h25l13 13v34H29zM54 18v13h13M38 42h20M38 52h20" fill="none" stroke="#0b2aa4" stroke-width="4"/><path d="M24 57l8 8 17-19" fill="none" stroke="#0b2aa4" stroke-width="5" stroke-linecap="round"/></g><text class="mini" x="42.5" y="78" text-anchor="middle">降低重複工作</text></g>
      </g>
    </g>

    <g transform="translate(514 594)">
      <rect x="0" y="0" width="486" height="406" rx="14" fill="url(#softPanel)" stroke="#9ec3ff" stroke-width="1.3" filter="url(#shadow)"/>
      <rect x="0" y="-10" width="338" height="36" rx="18" fill="url(#deepBlue)"/>
      <text class="sectionTitle" x="169" y="15" text-anchor="middle">工作坊流程（共 180 分鐘）</text>
      <g transform="translate(18 40)">
        <rect x="0" y="0" width="450" height="40" rx="7" fill="url(#deepBlue)"/>
        <text class="tableHead" x="61" y="26" text-anchor="middle">區段</text>
        <text class="tableHead" x="242" y="26" text-anchor="middle">內容</text>
        <text class="tableHead" x="410" y="26" text-anchor="middle">時長</text>
        <g stroke="#9ec3ff" stroke-width="1"><line x1="126" y1="0" x2="126" y2="344"/><line x1="364" y1="0" x2="364" y2="344"/></g>
        <g fill="#eef6ff" stroke="#bdd7ff" stroke-width="1">
          <rect x="0" y="40" width="450" height="60"/>
          <rect x="0" y="100" width="450" height="76" fill="#f8fbff"/>
          <rect x="0" y="176" width="450" height="52"/>
          <rect x="0" y="228" width="450" height="76" fill="#f8fbff"/>
          <rect x="0" y="304" width="450" height="40"/>
        </g>
        <text class="tableText" x="63" y="76" text-anchor="middle">準備階段</text><text class="tableText" x="148" y="76">環境設置與 AI 代理</text><text class="tableTime" x="410" y="76" text-anchor="middle">30 分</text>
        <text class="tableText" x="63" y="134" text-anchor="middle">模組一</text><text class="tableText" x="148" y="127">認識資料 → 清理資料 →</text><text class="tableText" x="148" y="157">信度檢驗</text><text class="tableTime" x="410" y="140" text-anchor="middle">65 分</text>
        <text class="tableText" x="63" y="208" text-anchor="middle">休息</text><text class="tableText" x="148" y="208">中場休息</text><text class="tableTime" x="410" y="208" text-anchor="middle">10 分</text>
        <text class="tableText" x="63" y="262" text-anchor="middle">模組二</text><text class="tableText" x="148" y="255">t 檢定 → 圖表生成 →</text><text class="tableText" x="148" y="285">分析報告</text><text class="tableTime" x="410" y="270" text-anchor="middle">75 分</text>
        <text class="tableText" x="63" y="330" text-anchor="middle" font-weight="900">合計</text><text class="tableTime" x="410" y="330" text-anchor="middle">180 分</text>
      </g>
    </g>
  </g>

