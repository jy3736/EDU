<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="315mm" viewBox="0 0 1024 1536" role="img" aria-labelledby="title desc">
  <title id="title">Vibe Coding 101A 工作坊直式印刷海報</title>
  <desc id="desc">從資料分析到教學洞察的 AI 工作流，三小時工作坊宣傳海報。</desc>
  <defs>
    <linearGradient id="topBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b5fb3"/>
      <stop offset="0.55" stop-color="#0f8dc4"/>
      <stop offset="1" stop-color="#065da8"/>
    </linearGradient>
    <linearGradient id="deepBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123fb5"/>
      <stop offset="1" stop-color="#061f86"/>
    </linearGradient>
    <linearGradient id="aiText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1a50ff"/>
      <stop offset="0.55" stop-color="#5a28e8"/>
      <stop offset="1" stop-color="#091453"/>
    </linearGradient>
    <linearGradient id="softPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0b2a6f" flood-opacity="0.16"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f2d78" flood-opacity="0.22"/>
    </filter>
    <clipPath id="avatarClip">
      <circle cx="847" cy="248" r="140"/>
    </clipPath>
    <style>
      .sans{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans CJK TC","Heiti TC","Segoe UI",Arial,sans-serif}
      .top{font-size:31px;font-weight:900;letter-spacing:.16em;fill:#fff}
      .pill{font-size:31px;font-weight:850;fill:#fff}
      .hero{font-size:65px;font-weight:1000;letter-spacing:-1.6px;fill:#061248}
      .hero2{font-size:64px;font-weight:1000;letter-spacing:-1.8px;fill:#061248}
      .lead{font-size:26px;font-weight:850;fill:#111827}
      .sectionTitle{font-size:24px;font-weight:900;fill:#fff}
      .body{font-size:17px;font-weight:650;fill:#111827}
      .body2{font-size:16px;font-weight:650;fill:#111827}
      .small{font-size:14px;font-weight:650;fill:#172554}
      .mini{font-size:12px;font-weight:700;fill:#172554}
      .blue{fill:#0b2aa4}
      .muted{fill:#475569}
      .tableHead{font-size:19.2px;font-weight:900;fill:#fff}
      .tableText{font-size:19.2px;font-weight:720;fill:#0f172a}
      .tableTime{font-size:20.4px;font-weight:850;fill:#0b2aa4}
      .stepNum{font-size:18px;font-weight:950;fill:#fff}
      .stepText{font-size:13.5px;font-weight:760;fill:#0f172a}
      .checkText{font-size:17px;font-weight:700;fill:#111827}
    </style>
  </defs>

  <rect width="1024" height="1536" fill="#ffffff"/>
  <rect width="1024" height="60" fill="url(#topBlue)"/>
  <text class="sans top" x="512" y="40" text-anchor="middle">教育部智慧雨林產業創生人才育成示範團隊計畫</text>

